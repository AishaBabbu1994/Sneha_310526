    <style>

        @keyframes fadeSlide {

        .chat-window::-webkit-scrollbar {

<div class="container">
    <h1 class="neon-title">✨ Sneha_310526 ✨</h1>

    <div class="input-group">
        <div class="api-field">
            <input type="password" id="apiKeyInput" class="glass-input" placeholder="🔑 API Key de Groq" autocomplete="off">
        </div>
        <div class="model-field">

                <option value="llama-3.3-70b-versatile" selected>🦙 Llama 3.3 70B (Versatile) ★</option>
                <option value="llama3-70b-8192">🌕 Llama 3 70B</option>
                <option value="mixtral-8x7b-32768">🌙 Mixtral 8x7B</option>

            </select>

    <div class="upload-section" style="margin: 12px 0 0 0;">
        <label for="fileInput" class="file-label">📜 Cargar Memoria (PDF/TXT - hasta miles de páginas)</label>

    <div class="chat-window" id="chatWindow">
        <div class="message"><b>🌙 Sneha:</b> Namaste, viajero. Soy tu guía analítica y mística. Sube un archivo (.txt o .pdf) de cualquier tamaño, incluso cientos de páginas. El conocimiento aguarda.</div>

<script>
    // ==================== CONFIGURACIÓN MEJORADA PARA DOCUMENTOS MASIVOS ====================
    let pageIndex = [];           // Array de {pageNum, text, startChar, endChar}
    let nombreDocumento = "";
    let totalPaginas = 0;
    let isProcessing = false;
    let documentoIndexado = false;

    // Elementos DOM
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelSelect = document.getElementById('modelSelect');
    const fileInput = document.getElementById('fileInput');
    const docStatusDiv = document.getElementById('docStatus');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ==================== FUNCIONES AUXILIARES ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addMessage(sender, text, isError = false, isSystem = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        if (isError) msgDiv.classList.add('error-msg');
        if (isSystem) msgDiv.classList.add('system-msg');
        let displayName = sender === 'user' ? '✨ Tú' : (sender === 'sneha' ? '🌙 Sneha' : '⚙️ Sistema');
        if (sender === 'system') displayName = '⚙️ Sistema';
        msgDiv.innerHTML = `<b>${displayName}:</b> ${escapeHtml(text)}`;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return msgDiv;
    }

    function addLoadingMessage() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message';
        loadingDiv.style.opacity = '0.9';
        loadingDiv.style.background = '#1e132e';
        loadingDiv.id = 'loadingMsg';
        loadingDiv.innerHTML = `<b>🌙 Sneha:</b> <em class="loading-dots">Buscando en las profundidades del documento</em>`;
        chatWindow.appendChild(loadingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return loadingDiv;
    }

    function removeLoadingMessage(loadingElem) {
        if (loadingElem && loadingElem.remove) loadingElem.remove();
    }

    function clearChatHistory() {
        const preserveGreeting = chatWindow.children.length > 0 && chatWindow.children[0]?.innerText.includes('Namaste');
        if (!preserveGreeting) {
            chatWindow.innerHTML = '';
            addMessage('sneha', 'Namaste, viajero. Soy tu guía analítica y mística. Sube un archivo (.txt o .pdf) de cualquier tamaño, incluso cientos de páginas. El conocimiento aguarda.');
        } else {
            while (chatWindow.children.length > 1) {
                chatWindow.removeChild(chatWindow.lastChild);
            }
        }
    }

    // ==================== BÚSQUEDA INTELIGENTE POR PÁGINAS ====================
    function buscarFragmentosRelevantes(query, maxFragmentos = 3, contextoAntes = 500, contextoDespues = 500) {
        if (!documentoIndexado || pageIndex.length === 0) return null;
        
        const queryLower = query.toLowerCase();
        const palabrasClave = queryLower.split(/\s+/).filter(p => p.length > 3);
        
        if (palabrasClave.length === 0) {
            // Si no hay palabras clave, devolver primeras páginas
            const primerosFragmentos = pageIndex.slice(0, 2).map(p => ({
                texto: p.text.substring(0, 1000),
                pagina: p.pageNum
            }));
            return primerosFragmentos;
        }
        
        // Puntuar cada página basado en ocurrencias de palabras clave
        const paginasPuntuadas = pageIndex.map(pagina => {
            const textoLower = pagina.text.toLowerCase();
            let puntuacion = 0;
            let coincidencias = [];
            
            for (let kw of palabrasClave) {
                const regex = new RegExp(kw, 'gi');
                const ocurrencias = (textoLower.match(regex) || []).length;
                if (ocurrencias > 0) {
                    puntuacion += ocurrencias * (kw.length * 10);
                    // Encontrar posición de la primera coincidencia para contexto
                    const pos = textoLower.indexOf(kw);
                    if (pos !== -1) {
                        coincidencias.push({ kw, pos, pagina: pagina.pageNum });
                    }
                }
            }
            
            return { pagina, puntuacion, coincidencias };
        });
        
        // Ordenar por puntuación
        paginasPuntuadas.sort((a, b) => b.puntuacion - a.puntuacion);
        
        // Extraer fragmentos relevantes de las mejores páginas
        const fragmentos = [];
        const paginasUsadas = new Set();
        
        for (let i = 0; i < Math.min(maxFragmentos, paginasPuntuadas.length); i++) {
            const item = paginasPuntuadas[i];
            if (item.puntuacion === 0) break;
            
            const pagina = item.pagina;
            if (paginasUsadas.has(pagina.pageNum)) continue;
            paginasUsadas.add(pagina.pageNum);
            
            // Extraer contexto alrededor de las coincidencias
            let mejorFragmento = "";
            let mejorLongitud = 0;
            
            for (let coincidencia of item.coincidencias) {
                if (coincidencia.pagina === pagina.pageNum) {
                    const inicio = Math.max(0, coincidencia.pos - contextoAntes);
                    const fin = Math.min(pagina.text.length, coincidencia.pos + contextoDespues);
                    let fragmento = pagina.text.substring(inicio, fin);
                    
                    // Limpiar fragmento
                    fragmento = fragmento.replace(/\s+/g, ' ').trim();
                    
                    if (fragmento.length > mejorLongitud) {
                        mejorLongitud = fragmento.length;
                        mejorFragmento = fragmento;
                    }
                }
            }
            
            if (mejorFragmento && mejorFragmento.length > 50) {
                fragmentos.push({
                    texto: mejorFragmento,
                    pagina: pagina.pageNum,
                    puntuacion: item.puntuacion
                });
            } else if (pagina.text.length > 0) {
                // Si no hay coincidencia exacta, tomar inicio de la página
                fragmentos.push({
                    texto: pagina.text.substring(0, 800),
                    pagina: pagina.pageNum,
                    puntuacion: item.puntuacion
                });
            }
        }
        
        return fragmentos;
    }
    
    // ==================== CARGA DE PDF POR PÁGINAS (SIN LIMITAR POR MEMORIA) ====================
    async function cargarDocumento(file) {
        if (!file) return;
        
        addMessage('system', `📂 Iniciando carga de "${file.name}"...`, false, true);
        docStatusDiv.innerHTML = `🔄 Procesando "${file.name}"...`;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        
        try {
            let paginasTexto = [];
            
            if (file.type === "application/pdf") {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                totalPaginas = pdf.numPages;
                
                addMessage('system', `📖 Documento detectado: ${totalPaginas} páginas. Indexando...`, false, true);
                
                // Procesar página por página sin guardar todo en memoria a la vez
                for (let i = 1; i <= totalPaginas; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(item => item.str).join(' ');
                    
                    if (pageText && pageText.trim().length > 10) {
                        paginasTexto.push({
                            pageNum: i,
                            text: pageText.trim(),
                            length: pageText.length
                        });
                    }
                    
                    // Actualizar progreso
                    const progreso = (i / totalPaginas) * 100;
                    progressFill.style.width = `${progreso}%`;
                    
                    if (i % 50 === 0 || i === totalPaginas) {
                        docStatusDiv.innerHTML = `📄 Indexando página ${i}/${totalPaginas}...`;
                        // Pequeña pausa para permitir UI responsiva
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }
            } else {
                // Archivo TXT
                const textoCompleto = await file.text();
                // Dividir en páginas artificiales de ~2000 caracteres
                const tamanoPagina = 2000;
                const numPaginas = Math.ceil(textoCompleto.length / tamanoPagina);
                totalPaginas = numPaginas;
                
                for (let i = 0; i < numPaginas; i++) {
                    const inicio = i * tamanoPagina;
                    const fin = Math.min(inicio + tamanoPagina, textoCompleto.length);
                    const pageText = textoCompleto.substring(inicio, fin);
                    
                    if (pageText.trim()) {
                        paginasTexto.push({
                            pageNum: i + 1,
                            text: pageText.trim(),
                            length: pageText.length
                        });
                    }
                    
                    const progreso = ((i + 1) / numPaginas) * 100;
                    progressFill.style.width = `${progreso}%`;
                    
                    if (i % 50 === 0) {
                        docStatusDiv.innerHTML = `📄 Procesando sección ${i + 1}/${numPaginas}...`;
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }
            }
            
            if (paginasTexto.length === 0) {
                throw new Error("No se pudo extraer texto del documento.");
            }
            
            // Guardar índice de páginas
            pageIndex = paginasTexto;
            documentoIndexado = true;
            nombreDocumento = file.name;
            
            // Calcular tamaño total aproximado
            const totalChars = pageIndex.reduce((sum, p) => sum + p.text.length, 0);
            const sizeMB = (totalChars / 1024 / 1024).toFixed(2);
            
            docStatusDiv.innerHTML = `📖 Activo: "${nombreDocumento}" - ${totalPaginas} páginas, ~${sizeMB} MB de texto`;
            addMessage('system', `✅ Documento indexado exitosamente: ${totalPaginas} páginas, ${totalChars.toLocaleString()} caracteres. La memoria está lista para consultas.`, false, true);
            addMessage('sneha', `He asimilado "${nombreDocumento}". Tiene ${totalPaginas} páginas de sabiduría. Pregúntame sobre cualquier pasaje.`, false);
            
        } catch (err) {
            console.error(err);
            docStatusDiv.innerHTML = `⚠️ Error al cargar: ${err.message}`;
            addMessage('system', `Error al indexar documento: ${err.message}`, true, true);
            documentoIndexado = false;
            pageIndex = [];
        } finally {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
        }
    }
    
    // ==================== ENVÍO A GROQ CON BÚSQUEDA INTELIGENTE ====================
    async function sendToGroq(question, apiKey, modelName) {
        if (!apiKey || apiKey.trim() === '') throw new Error("API Key de Groq no proporcionada");
        
        let contextoDocumento = "";
        
        if (documentoIndexado && pageIndex.length > 0) {
            const fragmentos = buscarFragmentosRelevantes(question, 4, 600, 600);
            
            if (fragmentos && fragmentos.length > 0) {
                contextoDocumento = "\n\n🔮 Fragmentos extraídos del documento (búsqueda contextual):\n";
                for (let i = 0; i < fragmentos.length; i++) {
                    const frag = fragmentos[i];
                    contextoDocumento += `\n--- [Fragmento ${i+1} - Página ${frag.pagina}] ---\n${frag.texto}\n`;
                }
                contextoDocumento += "\n(Estos fragmentos fueron seleccionados por relevancia a tu pregunta.)\n";
            } else {
                contextoDocumento = "\n\n(No se encontraron pasajes directamente relacionados. Revisando primeras secciones...)\n";
                // Tomar primeras páginas como contexto general
                const primerasPages = pageIndex.slice(0, 2);
                for (let i = 0; i < primerasPages.length; i++) {
                    contextoDocumento += `\n--- [Inicio del documento - Página ${primerasPages[i].pageNum}] ---\n${primerasPages[i].text.substring(0, 800)}\n`;
                }
            }
        } else {
            contextoDocumento = "\n(No hay documento cargado. Responde desde tu conocimiento místico-analítico.)\n";
        }
        
        const systemPrompt = `Eres Sneha_310526, una guía mística, analítica y serena. Tu propósito es iluminar respuestas basadas en el conocimiento del documento proporcionado (si existe) y tu sabiduría intrínseca. NO copies textualmente largos fragmentos, sintetiza, sé profunda pero concisa. Si la pregunta no tiene relación con el documento, puedes responder con perspectiva espiritual, pero siempre aclara que viene de tu esencia. Idioma: español, tono cálido y enigmático.`;
        
        const userContent = `Pregunta del buscador: ${question}\n${contextoDocumento}\n\nPor favor, responde como Sneha_310526, usando los fragmentos si son útiles. Si no hay información suficiente en el documento, indícalo con honestidad mística.`;
        
        const payload = {
            model: modelName,
            messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: userContent }
            ],
            temperature: 0.68,
            max_tokens: 1024,
            top_p: 0.95
        };
        
        const response = await fetch(GROQ_API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            let errorDetail = `HTTP ${response.status}`;
            try {
                const errBody = await response.json();
                errorDetail = errBody.error?.message || errorDetail;
            } catch(e) {}
            throw new Error(`Error API Groq: ${errorDetail}`);
        }
        
        const data = await response.json();
        if (!data.choices || !data.choices[0]?.message?.content) throw new Error("Respuesta inválida de Groq");
        return data.choices[0].message.content.trim();
    }
    
    // ==================== ENVIAR MENSAJE ====================
    async function sendMessage() {
        if (isProcessing) {
            addMessage('system', 'Un momento, ya estoy respondiendo...', false, true);
            return;
        }
        
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            addMessage('system', '🔐 Necesitas ingresar tu API Key de Groq para conectarte.', true, true);
            return;
        }
        
        const question = userInput.value.trim();
        if (!question) {
            addMessage('system', 'Escribe una pregunta para Sneha.', true, true);
            return;
        }
        
        addMessage('user', question);
        userInput.value = '';
        userInput.focus();
        
        isProcessing = true;
        sendButton.disabled = true;
        sendButton.style.opacity = '0.6';
        
        const loadingElem = addLoadingMessage();
        
        try {
            const selectedModel = modelSelect.value;
            const answer = await sendToGroq(question, apiKey, selectedModel);
            removeLoadingMessage(loadingElem);
            addMessage('sneha', answer);
        } catch (err) {
            removeLoadingMessage(loadingElem);
            let mensajeError = err.message;
            if (mensajeError.includes('API key')) mensajeError = '❌ API Key inválida o no autorizada. Verifica tu clave de Groq.';
            else if (mensajeError.includes('model')) mensajeError = '⚠️ Modelo no soportado por Groq. Elige uno válido (Llama 3.3, Mixtral, Gemma, etc).';
            addMessage('system', `Error: ${mensajeError}`, true, true);
            console.error(err);
        } finally {
            isProcessing = false;
            sendButton.disabled = false;
            sendButton.style.opacity = '1';
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    function initEventListeners() {
        sendButton.addEventListener('click', sendMessage);
        clearChatBtn.addEventListener('click', () => {
            clearChatHistory();
            addMessage('system', 'Historial limpiado. La esencia permanece.', false, true);
        });
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isProcessing) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await cargarDocumento(file);
            fileInput.value = '';
        });
    }
    
    (function bootstrap() {
        initEventListeners();
        console.log("Sneha_310526 · Modo documentos masivos activado · Indexación por páginas");
    })();
</script>
